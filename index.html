<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KRS Connect</title>
  <style>
    :root {
      --bg-primary: #F8F9FC;
      --bg-secondary: #FFFFFF;
      --bg-tertiary: #EEF0F4;
      --bg-hover: #E4E7ED;
      --bg-active: #D8DCE5;
      --text-primary: #1A1D26;
      --text-secondary: #5A5F72;
      --text-muted: #8C91A0;
      --accent: #5B7B94;
      --accent-hover: #4A6A83;
      --accent-light: rgba(91,123,148,0.1);
      --accent-orange: #D4762C;
      --accent-amber: #E8A832;
      --success: #22C55E;
      --warning: #F59E0B;
      --danger: #EF4444;
      --border: #E2E4E8;
      --shadow: rgba(0,0,0,0.06);
      --radius: 8px;
      --radius-lg: 12px;
      --transition: 0.15s ease;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
    }

    #app { width: 100%; height: 100vh; }

    /* Layout */
    .app-layout {
      display: flex;
      height: 100vh;
      width: 100%;
      background: var(--bg-primary);
    }

    /* Sidebar */
    .sidebar {
      width: 68px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0;
      gap: 24px;
      flex-shrink: 0;
      position: relative;
      z-index: 100;
    }

    .sidebar-logo {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--transition);
      padding: 3px;
    }

    .sidebar-logo:hover { background: var(--bg-tertiary); }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
    }

    .nav-item {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }

    .nav-item svg { width: 20px; height: 20px; }
    .nav-item:hover { color: var(--accent); background: var(--bg-hover); }
    .nav-item.active { color: var(--accent); background: var(--accent-light); }

    .sidebar-bottom {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }

    /* Main Content */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .sidebar-content {
      width: 280px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }

    .sidebar-search {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
    }

    .search-input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 13px;
    }

    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { outline: none; border-color: var(--accent); }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 12px;
    }

    .list-item {
      padding: 10px 12px;
      margin-bottom: 6px;
      border-radius: var(--radius);
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text-primary);
      text-align: left;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .list-item:hover { background: var(--bg-hover); }
    .list-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
    .list-item-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .list-item-text { flex: 1; font-size: 13px; }
    .list-item-badge { font-size: 11px; background: var(--danger); color: white; padding: 2px 6px; border-radius: 10px; }

    /* Content Area */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .content-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-secondary);
    }

    .content-header h1 { margin: 0; font-size: 18px; }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--radius);
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }

    .icon-btn svg { width: 18px; height: 18px; }
    .icon-btn:hover { background: var(--bg-hover); color: var(--accent); }

    .content-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Cards */
    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      box-shadow: 0 1px 3px var(--shadow);
      transition: all var(--transition);
    }

    .card:hover { box-shadow: 0 4px 12px var(--shadow); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      flex: 1;
    }

    .card-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Posts */
    .post {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      box-shadow: 0 1px 3px var(--shadow);
      transition: all var(--transition);
    }

    .post:hover { box-shadow: 0 4px 12px var(--shadow); }

    .post-header {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }

    .post-author {
      font-weight: 600;
      color: var(--text-primary);
      font-size: 14px;
    }

    .post-time {
      font-size: 12px;
      color: var(--text-muted);
    }

    .post-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
      margin: 8px 0;
      cursor: pointer;
    }

    .post-content {
      font-size: 14px;
      color: var(--text-primary);
      line-height: 1.5;
      margin: 8px 0;
    }

    .post-content p { margin: 8px 0; }
    .post-content ul { margin: 8px 0; padding-left: 20px; }
    .post-content li { margin: 4px 0; }
    .post-content strong { font-weight: 600; }

    .post-reactions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 12px 0;
    }

    .reaction {
      background: var(--bg-hover);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 4px 10px;
      font-size: 13px;
      cursor: pointer;
      transition: all var(--transition);
    }

    .reaction:hover { background: var(--accent-light); border-color: var(--accent); }

    .post-footer {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-secondary);
    }

    .post-footer button {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 0;
      transition: color var(--transition);
    }

    .post-footer button:hover { color: var(--accent); }

    /* Thread */
    .thread-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .thread-panel {
      width: 100%;
      max-width: 500px;
      height: 100%;
      background: var(--bg-secondary);
      display: flex;
      flex-direction: column;
      margin-left: auto;
      border-left: 1px solid var(--border);
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

    .thread-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .thread-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .thread-reply {
      background: var(--bg-tertiary);
      border-radius: var(--radius-lg);
      padding: 12px;
    }

    .thread-reply-author {
      font-weight: 600;
      font-size: 13px;
      color: var(--text-primary);
    }

    .thread-reply-time {
      font-size: 11px;
      color: var(--text-muted);
    }

    .thread-reply-content {
      font-size: 13px;
      color: var(--text-primary);
      margin-top: 6px;
      line-height: 1.4;
    }

    .thread-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    .compose-box {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .compose-input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 13px;
      resize: none;
      max-height: 100px;
      font-family: inherit;
    }

    .compose-input:focus { outline: none; border-color: var(--accent); }

    .compose-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--radius);
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      flex-shrink: 0;
    }

    .compose-btn:hover { background: var(--accent-hover); }
    .compose-btn:disabled { background: var(--text-muted); cursor: not-allowed; }

    /* Avatar */
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 13px;
      flex-shrink: 0;
    }

    /* Emoji Picker */
    .emoji-picker-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 500;
    }

    .emoji-picker {
      position: fixed;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: 0 10px 40px var(--shadow);
      width: 340px;
      max-height: 400px;
      display: flex;
      flex-direction: column;
      z-index: 501;
    }

    .emoji-picker-header {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    .emoji-picker-header input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 13px;
    }

    .emoji-picker-header input:focus { outline: none; border-color: var(--accent); }

    .emoji-grid {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 4px;
    }

    .emoji-category {
      grid-column: 1 / -1;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      margin-top: 4px;
      padding: 4px 8px;
    }

    .emoji-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      padding: 4px;
      border-radius: var(--radius);
      transition: all var(--transition);
    }

    .emoji-btn:hover { background: var(--bg-hover); }

    /* Toast */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 2000;
    }

    .toast {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 12px 16px;
      display: flex;
      gap: 12px;
      align-items: center;
      box-shadow: 0 4px 12px var(--shadow);
      animation: toastSlideIn 0.3s ease;
    }

    @keyframes toastSlideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .toast.leaving { animation: toastSlideOut 0.3s ease forwards; }
    @keyframes toastSlideOut { to { transform: translateX(400px); opacity: 0; } }

    .toast > div { flex: 1; }
    .toast strong { color: var(--text-primary); }

    /* Setup/Selection Screens */
    .setup-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 40px;
      text-align: center;
    }

    .setup-screen h1 {
      font-size: 32px;
      margin-bottom: 30px;
    }

    .setup-screen input {
      display: block;
      width: 300px;
      margin: 10px auto;
      padding: 10px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 14px;
    }

    .setup-screen input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .setup-screen button {
      padding: 10px 30px;
      margin-top: 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 14px;
      transition: all var(--transition);
    }

    .setup-screen button:hover {
      background: var(--accent-hover);
    }

    .setup-screen label {
      display: block;
      margin: 15px 0;
      font-size: 16px;
    }

    .user-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 16px;
      max-width: 600px;
      margin: 30px auto 0;
    }

    .user-btn {
      padding: 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: white;
      cursor: pointer;
      transition: all var(--transition);
    }

    .user-btn:hover {
      box-shadow: 0 4px 12px var(--shadow);
      transform: translateY(-2px);
    }

    .user-btn-name {
      margin-top: 10px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }

    /* Chat UI */
    .conversation-list { display: flex; flex-direction: column; height: 100%; }
    .conversation-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .conversation-header h2 { margin: 0; font-size: 16px; }
    .new-chat-btn { width: 32px; height: 32px; border-radius: var(--radius); background: var(--accent); color: white; border: none; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all var(--transition); }
    .new-chat-btn:hover { background: var(--accent-hover); }

    .new-chat-picker { padding: 8px 12px; border-bottom: 1px solid var(--border); max-height: 200px; overflow-y: auto; }
    .user-pick-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 8px 10px; border: none; background: none; cursor: pointer; border-radius: var(--radius); font-size: 14px; color: var(--text-primary); transition: background var(--transition); }
    .user-pick-btn:hover { background: var(--bg-hover); }

    .conversation-items { flex: 1; overflow-y: auto; }

    .conversation-item { display: flex; align-items: center; gap: 12px; width: 100%; padding: 12px 16px; border: none; background: none; cursor: pointer; text-align: left; transition: background var(--transition); border-bottom: 1px solid var(--border); }
    .conversation-item:hover { background: var(--bg-hover); }
    .conversation-item.active { background: var(--accent-light); }
    .conversation-info { flex: 1; min-width: 0; }
    .conversation-name { font-weight: 600; font-size: 14px; color: var(--text-primary); }
    .conversation-preview { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .conversation-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .conversation-time { font-size: 11px; color: var(--text-muted); }
    .unread-badge { background: var(--accent-orange); color: white; border-radius: 10px; padding: 2px 7px; font-size: 11px; font-weight: 600; }

    .chat-panel { display: flex; flex-direction: column; height: 100%; }
    .chat-header { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .chat-header-name { font-weight: 600; font-size: 16px; }
    .back-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-secondary); padding: 4px; }

    .chat-messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 6px; }
    .chat-msg { display: flex; gap: 8px; max-width: 75%; }
    .chat-msg.own { align-self: flex-end; flex-direction: row-reverse; }
    .chat-msg.other { align-self: flex-start; }
    .chat-bubble { padding: 10px 14px; border-radius: 16px; background: var(--bg-tertiary); word-break: break-word; }
    .chat-bubble.own { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
    .chat-bubble.other { border-bottom-left-radius: 4px; }
    .chat-text { font-size: 14px; line-height: 1.5; }
    .chat-time { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .chat-bubble.own .chat-time { color: rgba(255,255,255,0.7); }

    .chat-input-bar { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); align-items: flex-end; }
    .chat-input-bar input { flex: 1; padding: 10px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-primary); font-size: 14px; }
    .chat-input-bar input:focus { outline: none; border-color: var(--accent); }
    .chat-send-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); color: white; border: none; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all var(--transition); flex-shrink: 0; }
    .chat-send-btn:hover { background: var(--accent-hover); }
    .chat-send-btn:disabled { background: var(--text-muted); cursor: not-allowed; }

    .chat-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); font-size: 16px; gap: 12px; }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar-content { width: 100%; }
      .content { display: none; }
      .app-layout { flex-direction: column; }
      .sidebar { width: 100%; height: 60px; flex-direction: row; padding: 0 16px; gap: 16px; }
      .sidebar-nav { flex-direction: row; flex: 1; }
      .sidebar-bottom { flex-direction: row; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    class DataService {
      constructor(supabaseClient = null) {
        this.sb = supabaseClient;
        this.isDemo = !supabaseClient;
        this.subscriptions = [];
      }

      async getUsers() {
        if (this.isDemo) return [...MOCK_USERS];
        try {
          const { data, error } = await this.sb.from('users').select('*').order('display_name');
          if (error) throw error;
          return data || [];
        } catch (err) {
          console.error('getUsers error:', err);
          return [];
        }
      }

      async getTeams() {
        if (this.isDemo) return [...MOCK_TEAMS];
        try {
          const { data, error } = await this.sb.from('teams').select('*').order('category, name');
          if (error) throw error;
          return data || [];
        } catch (err) {
          console.error('getTeams error:', err);
          return [];
        }
      }

      async getChannels(teamId) {
        if (this.isDemo) return MOCK_CHANNELS[teamId] || [{ id: `default-${teamId}`, name: 'Allgemein', team_id: teamId }];
        try {
          const { data, error } = await this.sb.from('channels').select('*').eq('team_id', teamId).order('name');
          if (error) throw error;
          return data || [];
        } catch (err) {
          console.error('getChannels error:', err);
          return [];
        }
      }

      async getPosts(channelId) {
        if (this.isDemo) return MOCK_POSTS[channelId] || [];
        try {
          const { data, error } = await this.sb.from('posts').select('*, author:users(*)').eq('channel_id', channelId).is('parent_id', null).order('created_at', { ascending: false });
          if (error) throw error;
          return data || [];
        } catch (err) {
          console.error('getPosts error:', err);
          return [];
        }
      }

      async createPost(channelId, authorId, content, title = null) {
        if (this.isDemo) {
          const author = MOCK_USERS.find(u => u.id === authorId);
          const post = { id: 'p' + Date.now(), channel_id: channelId, author, content, title, reactions: [], replies: 0, reply_users: [], created_at: new Date().toLocaleString('de-DE') };
          if (!MOCK_POSTS[channelId]) MOCK_POSTS[channelId] = [];
          MOCK_POSTS[channelId].unshift(post);
          return post;
        }
        try {
          const { data, error } = await this.sb.from('posts').insert({ channel_id: channelId, author_id: authorId, content, title }).select('*, author:users(*)').single();
          if (error) throw error;
          return data;
        } catch (err) {
          console.error('createPost error:', err);
          return null;
        }
      }

      async getReplies(postId) {
        if (this.isDemo) return MOCK_REPLIES[postId] || [];
        try {
          const { data, error } = await this.sb.from('posts').select('*, author:users(*)').eq('parent_id', postId).order('created_at');
          if (error) throw error;
          return data || [];
        } catch (err) {
          console.error('getReplies error:', err);
          return [];
        }
      }

      async createReply(postId, channelId, authorId, content) {
        if (this.isDemo) {
          const author = MOCK_USERS.find(u => u.id === authorId);
          const reply = { id: 'r' + Date.now(), parent_id: postId, author, content, created_at: new Date().toLocaleString('de-DE') };
          if (!MOCK_REPLIES[postId]) MOCK_REPLIES[postId] = [];
          MOCK_REPLIES[postId].push(reply);
          return reply;
        }
        try {
          const { data, error } = await this.sb.from('posts').insert({ parent_id: postId, channel_id: channelId, author_id: authorId, content }).select('*, author:users(*)').single();
          if (error) throw error;
          return data;
        } catch (err) {
          console.error('createReply error:', err);
          return null;
        }
      }

      async getConversations(userId) {
        if (this.isDemo) return [...MOCK_CONVERSATIONS];
        try {
          const { data: memberships, error: err1 } = await this.sb.from('conversation_members').select('conversation_id').eq('user_id', userId);
          if (err1) throw err1;
          if (!memberships?.length) return [];
          const convIds = memberships.map(m => m.conversation_id);
          const { data, error } = await this.sb.from('conversations').select('*').in('id', convIds);
          if (error) throw error;
          return data || [];
        } catch (err) {
          console.error('getConversations error:', err);
          return [];
        }
      }

      async getMessages(conversationId) {
        if (this.isDemo) return MOCK_MESSAGES[conversationId] || [];
        try {
          const { data, error } = await this.sb.from('messages').select('*, sender:users(*)').eq('conversation_id', conversationId).order('created_at');
          if (error) throw error;
          return data || [];
        } catch (err) {
          console.error('getMessages error:', err);
          return [];
        }
      }

      async sendMessage(conversationId, senderId, content) {
        if (this.isDemo) {
          const sender = MOCK_USERS.find(u => u.id === senderId);
          const msg = { id: 'm' + Date.now(), conversation_id: conversationId, sender, content, created_at: new Date().toLocaleString('de-DE') };
          if (!MOCK_MESSAGES[conversationId]) MOCK_MESSAGES[conversationId] = [];
          MOCK_MESSAGES[conversationId].push(msg);
          return msg;
        }
        try {
          const { data, error } = await this.sb.from('messages').insert({ conversation_id: conversationId, sender_id: senderId, content }).select('*, sender:users(*)').single();
          if (error) throw error;
          return data;
        } catch (err) {
          console.error('sendMessage error:', err);
          return null;
        }
      }

      subscribeToChannel(channelId, onNewPost) {
        if (this.isDemo) return () => {};
        try {
          const sub = this.sb.channel('posts-' + channelId)
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'posts', filter: `channel_id=eq.${channelId}` },
              payload => onNewPost(payload.new))
            .subscribe();
          this.subscriptions.push(sub);
          return () => sub.unsubscribe();
        } catch (err) {
          console.error('subscribeToChannel error:', err);
          return () => {};
        }
      }

      subscribeToConversation(conversationId, onNewMessage) {
        if (this.isDemo) return () => {};
        try {
          const sub = this.sb.channel('messages-' + conversationId)
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `conversation_id=eq.${conversationId}` },
              payload => onNewMessage(payload.new))
            .subscribe();
          this.subscriptions.push(sub);
          return () => sub.unsubscribe();
        } catch (err) {
          console.error('subscribeToConversation error:', err);
          return () => {};
        }
      }

      cleanup() {
        this.subscriptions.forEach(s => {
          try { s.unsubscribe(); } catch (e) { }
        });
        this.subscriptions = [];
      }

    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    function getInitials(name) {
      return name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
    }

    function Avatar({ user, size = 36 }) {
      const style = { width: size, height: size, fontSize: size * 0.38, background: user.avatar_color };
      return React.createElement('div', { className: 'avatar', style }, getInitials(user.display_name));
    }

    function EmojiPicker({ onSelect, onClose, position }) {
      const [search, setSearch] = useState('');

      const filtered = useMemo(() => {
        if (!search) return EMOJI_DATA;
        const s = search.toLowerCase();
        const result = {};
        for (const [cat, emojis] of Object.entries(EMOJI_DATA)) {
          const f = emojis.filter(e => {
            const names = EMOJI_NAMES[e] || '';
            return names.toLowerCase().includes(s) || e.includes(s);
          });
          if (f.length) result[cat] = f;
        }
        return result;
      }, [search]);

      return React.createElement('div', { className: 'emoji-picker-overlay', onClick: onClose },
        React.createElement('div', { className: 'emoji-picker', style: { bottom: position?.bottom || '60px', right: position?.right || '24px' }, onClick: e => e.stopPropagation() },
          React.createElement('div', { className: 'emoji-picker-header' },
            React.createElement('input', { type: 'text', placeholder: 'Emoji suchen...', value: search, onChange: e => setSearch(e.target.value), autoFocus: true })
          ),
          React.createElement('div', { className: 'emoji-grid' },
            Object.entries(filtered).map(([cat, emojis]) =>
              React.createElement(React.Fragment, { key: cat },
                React.createElement('div', { className: 'emoji-category' }, cat),
                emojis.map(emoji =>
                  React.createElement('button', { key: emoji, className: 'emoji-btn', onClick: () => { onSelect(emoji); onClose(); } }, emoji)
                )
              )
            )
          )
        )
      );
    }

    function SetupScreen({ onSetupComplete }) {
      const [url, setUrl] = useState('');
      const [key, setKey] = useState('');
      const [demo, setDemo] = useState(true);
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSetup = async () => {
        if (demo) {
          onSetupComplete({ isDemo: true });
          return;
        }
        if (!url.trim() || !key.trim()) {
          setError('Bitte beide Felder ausf├╝llen');
          return;
        }
        setLoading(true);
        try {
          const { createClient } = window.supabase;
          const client = createClient(url, key);
          const { data, error: dbError } = await client.from('users').select('id').limit(1);
          if (dbError) {
            setError('Supabase Credentials ung├╝ltig: ' + dbError.message);
            setLoading(false);
            return;
          }
          onSetupComplete({ isDemo: false, client });
        } catch (err) {
          setError('Fehler: ' + err.message);
          setLoading(false);
        }
      };

      return React.createElement('div', { className: 'setup-screen' },
        React.createElement('img', { src: KRS_LOGO, alt: 'KRS Logo', style: { width: '80px', height: '80px', objectFit: 'contain', marginBottom: '12px' } }),
        React.createElement('h1', null, 'KRS Connect'),
        React.createElement('p', null, 'W├дhle einen Modus:'),
        React.createElement('label', null,
          React.createElement('input', { type: 'radio', checked: demo, onChange: () => { setDemo(true); setError(''); } }),
          ' Demo-Modus (Mock-Daten)'
        ),
        React.createElement('label', null,
          React.createElement('input', { type: 'radio', checked: !demo, onChange: () => { setDemo(false); setError(''); } }),
          ' Supabase verbinden'
        ),
        !demo && React.createElement(React.Fragment, null,
          React.createElement('input', { type: 'text', placeholder: 'Supabase URL', value: url, onChange: e => setUrl(e.target.value) }),
          React.createElement('input', { type: 'password', placeholder: 'API Key', value: key, onChange: e => setKey(e.target.value) })
        ),
        error && React.createElement('p', { style: { color: 'var(--danger)', marginTop: '10px' } }, error),
        React.createElement('button', { onClick: handleSetup, disabled: loading }, loading ? 'Verbindung wird hergestellt...' : 'Verbinden')
      );
    }

              React.createElement('div', { className: 'user-btn-name' }, user.display_name)

          )
        )
      );
    }

            post.reactions && post.reactions.length > 0 && React.createElement('div', { className: 'post-reactions' },
              post.reactions.map(r =>
                React.createElement('div', { key: r.emoji, className: 'reaction' }, r.emoji + ' ' + r.count)
              )
            ),
            React.createElement('div', { className: 'post-footer' },
              React.createElement('button', { onClick: () => onOpenThread(post) }, 'ЁЯТм Antworten (' + post.replies + ')')
            )
          )
        )
      );
    }

    function ThreadPanel({ post, replies, dataService, user, onClose }) {
      const [replyContent, setReplyContent] = useState('');
      const [saving, setSaving] = useState(false);

      const handleSendReply = async (e) => {
        e.preventDefault();
        if (!replyContent.trim()) return;
        setSaving(true);
        await dataService.createReply(post.id, post.channel_id || 1, user.id, replyContent);
        setReplyContent('');
        setSaving(false);
      };

      return React.createElement('div', { className: 'thread-container', onClick: onClose },
        React.createElement('div', { className: 'thread-panel', onClick: e => e.stopPropagation() },
          React.createElement('div', { className: 'thread-header' },
            React.createElement('h3', null, 'Antworten'),
            React.createElement('button', { className: 'icon-btn', onClick: onClose, dangerouslySetInnerHTML: { __html: Icons.x } })
          ),
          React.createElement('div', { className: 'thread-body' },
            React.createElement('div', { className: 'post' },
              React.createElement('div', { className: 'post-header' },
                React.createElement(Avatar, { user: post.author, size: 36 }),
                React.createElement('div', null,
                  React.createElement('div', { className: 'post-author' }, post.author.display_name),
                  React.createElement('div', { className: 'post-time' }, post.created_at)
                )
              ),
              post.title && React.createElement('div', { className: 'post-title' }, post.title),
              React.createElement('div', { className: 'post-content', dangerouslySetInnerHTML: { __html: post.content } })
            ),
            replies.map(reply =>
              React.createElement('div', { key: reply.id, className: 'thread-reply' },
                React.createElement('div', { className: 'thread-reply-author' }, reply.author.display_name),
                React.createElement('div', { className: 'thread-reply-time' }, reply.created_at),
                React.createElement('div', { className: 'thread-reply-content' }, reply.content)
              )
            )
          ),
          React.createElement('div', { className: 'thread-footer' },
            React.createElement('form', { onSubmit: handleSendReply, style: { display: 'flex', gap: '8px', width: '100%' } },
              React.createElement('textarea', { placeholder: 'Antwort schreiben...', value: replyContent, onChange: e => setReplyContent(e.target.value), style: { flex: 1, padding: '10px', borderRadius: 'var(--radius)', border: '1px solid var(--border)', background: 'var(--bg-primary)', color: 'var(--text-primary)', fontSize: '14px', minHeight: '60px', fontFamily: 'inherit', fontWeight: 'inherit', resize: 'none' } }),
              React.createElement('button', { type: 'submit', disabled: saving, style: { padding: '8px 16px', background: saving ? 'var(--text-muted)' : 'var(--accent)', color: 'white', border: 'none', borderRadius: 'var(--radius)', cursor: saving ? 'not-allowed' : 'pointer', alignSelf: 'flex-end', whiteSpace: 'nowrap', fontSize: '14px' } }, saving ? 'Wird gesendet...' : 'Senden')
            )
          )
        )
      );
    }

    // ============================================================
    // CHAT COMPONENTS
    // ============================================================

    function ConversationList({ conversations, currentUser, selectedId, onSelect, onNewChat, allUsers }) {
      const [showNewChat, setShowNewChat] = useState(false);

      return React.createElement('div', { className: 'conversation-list' },
        React.createElement('div', { className: 'conversation-header' },
          React.createElement('h2', null, 'Chats'),
          React.createElement('button', {
            className: 'new-chat-btn',
            onClick: () => setShowNewChat(!showNewChat),
            title: 'Neuer Chat',
            dangerouslySetInnerHTML: { __html: showNewChat ? Icons.x : Icons.plus }
          })
        ),
        showNewChat && React.createElement('div', { className: 'new-chat-picker' },
          allUsers
            .filter(u => u.id !== currentUser.id)
            .map(u => React.createElement('button', {
              key: u.id,
              className: 'user-pick-btn',
              onClick: () => { onNewChat(u); setShowNewChat(false); }
            },
              React.createElement(Avatar, { user: u, size: 28 }),
              React.createElement('span', null, u.display_name)
            ))
        ),
        React.createElement('div', { className: 'conversation-items' },
          conversations.map(conv =>
            React.createElement('button', {
              key: conv.id,
              className: 'conversation-item' + (selectedId === conv.id ? ' active' : ''),
              onClick: () => onSelect(conv)
            },
              React.createElement(Avatar, { user: conv.user, size: 40 }),
              React.createElement('div', { className: 'conversation-info' },
                React.createElement('div', { className: 'conversation-name' }, conv.user.display_name),
                React.createElement('div', { className: 'conversation-preview' }, conv.lastMessage)
              ),
              React.createElement('div', { className: 'conversation-meta' },
                React.createElement('span', { className: 'conversation-time' }, conv.time),
                conv.unread > 0 && React.createElement('span', { className: 'unread-badge' }, conv.unread)
              )
            )
          ),
          conversations.length === 0 && React.createElement('div', { style: { padding: '20px', textAlign: 'center', color: 'var(--text-muted)', fontSize: '14px' } }, 'Noch keine Chats. Starte einen neuen Chat!')
        )
      );
    }

    function ChatPanel({ conversation, messages, dataService, currentUser, onBack }) {
      const [input, setInput] = useState('');
      const [sending, setSending] = useState(false);
      const messagesEndRef = useRef(null);

      useEffect(() => {
        if (messagesEndRef.current) {
          messagesEndRef.current.scrollIntoView({ behavior: 'smooth' });
        }
      }, [messages]);

      const handleSend = async (e) => {
        e.preventDefault();
        if (!input.trim() || sending) return;
        setSending(true);
        await dataService.sendMessage(conversation.id, currentUser.id, input);
        setInput('');
        setSending(false);
      };

      const isOwn = (msg) => {
        const senderId = msg.sender?.id || msg.sender_id;
        return senderId === currentUser.id;
      };

      if (!conversation) {
        return React.createElement('div', { className: 'chat-empty' },
          React.createElement('div', { style: { fontSize: '48px' } }, 'ЁЯТм'),
          React.createElement('div', null, 'W├дhle einen Chat oder starte einen neuen')
        );
      }

      return React.createElement('div', { className: 'chat-panel' },
        React.createElement('div', { className: 'chat-header' },
          onBack && React.createElement('button', { className: 'back-btn', onClick: onBack, dangerouslySetInnerHTML: { __html: Icons.back } }),
          React.createElement(Avatar, { user: conversation.user, size: 32 }),
          React.createElement('span', { className: 'chat-header-name' }, conversation.user.display_name)
        ),
        React.createElement('div', { className: 'chat-messages' },
          messages.map(msg =>
            React.createElement('div', {
              key: msg.id,
              className: 'chat-msg ' + (isOwn(msg) ? 'own' : 'other')
            },
              !isOwn(msg) && React.createElement(Avatar, { user: msg.sender, size: 28 }),
              React.createElement('div', { className: 'chat-bubble ' + (isOwn(msg) ? 'own' : 'other') },
                React.createElement('div', { className: 'chat-text' }, msg.content),
                React.createElement('div', { className: 'chat-time' }, msg.created_at)
              )
            )
          ),
          messages.length === 0 && React.createElement('div', { className: 'chat-empty' },
            React.createElement('div', null, 'Noch keine Nachrichten. Schreib die erste!')
          ),
          React.createElement('div', { ref: messagesEndRef })
        ),
        React.createElement('form', { className: 'chat-input-bar', onSubmit: handleSend },
          React.createElement('input', {
            type: 'text',
            placeholder: 'Nachricht schreiben...',
            value: input,
            onChange: e => setInput(e.target.value),
            disabled: sending
          }),
          React.createElement('button', {
            type: 'submit',
            className: 'chat-send-btn',
            disabled: sending || !input.trim(),
            dangerouslySetInnerHTML: { __html: Icons.send }
          })
        )
      );
    }

    // ============================================================
    // APP COMPONENT
    // ============================================================

    function App() {
      const [setupComplete, setSetupComplete] = useState(false);
      const [supabaseClient, setSupabaseClient] = useState(null);
      const [isDemo, setIsDemo] = useState(true);
      const [user, setUser] = useState(null);

      // View: 'teams' or 'chat'
      const [view, setView] = useState('teams');

      // Teams state
      const [teams, setTeams] = useState([]);
      const [selectedTeam, setSelectedTeam] = useState(null);
      const [channels, setChannels] = useState([]);
      const [selectedChannel, setSelectedChannel] = useState(null);
      const [posts, setPosts] = useState([]);
      const [replies, setReplies] = useState([]);
      const [openThread, setOpenThread] = useState(null);

      // Chat state
      const [conversations, setConversations] = useState([]);
      const [selectedConversation, setSelectedConversation] = useState(null);
      const [chatMessages, setChatMessages] = useState([]);
      const [allUsers, setAllUsers] = useState([]);

      const dataService = useMemo(() => new DataService(isDemo ? null : supabaseClient), [supabaseClient, isDemo]);

      const handleSetupComplete = ({ isDemo: demoMode, client }) => {
        setIsDemo(demoMode);
        if (client) setSupabaseClient(client);
        setSetupComplete(true);
      };

      const handleUserSelected = async (selectedUser) => {
        setUser(selectedUser);
        // Load teams
        const teamsData = await dataService.getTeams();
        setTeams(teamsData);
        if (teamsData.length > 0) {
          const firstTeam = teamsData[0];
          setSelectedTeam(firstTeam);
          const channelsData = await dataService.getChannels(firstTeam.id);
          setChannels(channelsData);
          if (channelsData.length > 0) {
            setSelectedChannel(channelsData[0]);
          }
        }
        // Load conversations + all users for chat
        const convData = await dataService.getConversations(selectedUser.id);
        setConversations(convData || []);
        const usersData = await dataService.getUsers();
        setAllUsers(usersData || MOCK_USERS);
      };

      // Posts subscription
      useEffect(() => {
        if (selectedChannel) {
          let cancelled = false;
          const loadPosts = async () => {
            const postsData = await dataService.getPosts(selectedChannel.id);
            if (!cancelled) setPosts(postsData);
          };
          loadPosts();
          const unsub = dataService.subscribeToChannel(selectedChannel.id, newPost => {
            if (!cancelled) setPosts(prev => [newPost, ...prev]);
          });
          return () => { cancelled = true; unsub(); };
        }
      }, [selectedChannel, dataService]);

      // Thread replies
      useEffect(() => {
        if (openThread) {
          let cancelled = false;
          const loadReplies = async () => {
            const repliesData = await dataService.getReplies(openThread.id);
            if (!cancelled) setReplies(repliesData);
          };
          loadReplies();
          return () => { cancelled = true; };
        }
      }, [openThread, dataService]);

      // Chat messages subscription
      useEffect(() => {
        if (selectedConversation) {
          let cancelled = false;
          const loadMessages = async () => {
            const msgs = await dataService.getMessages(selectedConversation.id);
            if (!cancelled) setChatMessages(msgs || []);
          };
          loadMessages();
          const unsub = dataService.subscribeToConversation(selectedConversation.id, newMsg => {
            if (!cancelled) setChatMessages(prev => [...prev, newMsg]);
          });
          return () => { cancelled = true; unsub(); };
        }
      }, [selectedConversation, dataService]);

      const handleTeamSelect = async (team) => {
        setSelectedTeam(team);
        const channelsData = await dataService.getChannels(team.id);
        setChannels(channelsData);
        if (channelsData.length > 0) {
          setSelectedChannel(channelsData[0]);
        }
      };

      const handleNewChat = (targetUser) => {
        // Check if conversation already exists
        const existing = conversations.find(c => c.user.id === targetUser.id);
        if (existing) {
          setSelectedConversation(existing);
          return;
        }
        // Create new conversation (demo mode: local only)
        const newConv = {
          id: 'new-' + Date.now(),
          user: targetUser,
          lastMessage: '',
          time: 'Jetzt',
          unread: 0
        };
        setConversations(prev => [newConv, ...prev]);
        setSelectedConversation(newConv);
      };

      const handleLogout = () => {
        dataService.cleanup();
        setSetupComplete(false);
        setUser(null);
        setView('teams');
        setTeams([]);
        setSelectedTeam(null);
        setChannels([]);
        setSelectedChannel(null);
        setPosts([]);
        setConversations([]);
        setSelectedConversation(null);
        setChatMessages([]);
      };

      if (!setupComplete) {
        return React.createElement(SetupScreen, { onSetupComplete: handleSetupComplete });
      }

      if (!user) {
        return React.createElement(UserSelection, { users: MOCK_USERS, onUserSelected: handleUserSelected });
      }

      // === TEAMS VIEW ===
      const teamsView = React.createElement(React.Fragment, null,
        React.createElement('div', { className: 'sidebar-content' },
          React.createElement('div', { className: 'sidebar-header' },
            React.createElement('h2', null, 'Teams')
          ),
          React.createElement('div', { className: 'sidebar-list' },
            teams.map(team =>
              React.createElement('button', {
                key: team.id,
                className: 'list-item' + (selectedTeam?.id === team.id ? ' active' : ''),
                onClick: () => handleTeamSelect(team),
                style: { display: 'flex', gap: '8px', alignItems: 'center' }
              },
                React.createElement('div', { style: { width: '24px', height: '24px', display: 'flex', alignItems: 'center', justifyContent: 'center', background: team.icon_color, borderRadius: 'var(--radius)', color: 'white', fontSize: '12px', fontWeight: '600' } }, team.icon_text),
                React.createElement('span', { className: 'list-item-text' }, team.name)
              )
            )
          )
        ),
        React.createElement('div', { className: 'sidebar-content' },
          selectedTeam && React.createElement(React.Fragment, null,
            React.createElement('div', { className: 'sidebar-header' },
              React.createElement('h2', null, '# Kan├дle')
            ),
            React.createElement('div', { className: 'sidebar-list' },
              channels.map(ch =>
                React.createElement('button', {
                  key: ch.id,
                  className: 'list-item' + (selectedChannel?.id === ch.id ? ' active' : ''),
                  onClick: () => setSelectedChannel(ch)
                },
                  React.createElement('span', { style: { fontSize: '12px' } }, '#'),
                  React.createElement('span', { className: 'list-item-text' }, ch.name),
                  ch.unread > 0 && React.createElement('span', { className: 'list-item-badge' }, ch.unread)
                )
              )
            )
          )
        ),
        React.createElement('div', { className: 'content' },
          selectedChannel && React.createElement(React.Fragment, null,
            React.createElement('div', { className: 'content-header' },
              React.createElement('h1', null, '# ' + selectedChannel.name)
            ),
            React.createElement('div', { className: 'content-body' },
              React.createElement(PostList, { posts, dataService, user, onOpenThread: setOpenThread })
            )
          )
        )
      );

      // === CHAT VIEW ===
      const chatView = React.createElement(React.Fragment, null,
        React.createElement('div', { className: 'sidebar-content', style: { borderRight: '1px solid var(--border)' } },
          React.createElement(ConversationList, {
            conversations,
            currentUser: user,
            selectedId: selectedConversation?.id,
            onSelect: setSelectedConversation,
            onNewChat: handleNewChat,
            allUsers
          })
        ),
        React.createElement('div', { className: 'content' },
          React.createElement(ChatPanel, {
            conversation: selectedConversation,
            messages: chatMessages,
            dataService,
            currentUser: user,
            onBack: null
          })
        )
      );

      return React.createElement('div', { className: 'app-layout' },
        // Sidebar mit View-Switcher
        React.createElement('div', { className: 'sidebar' },
          React.createElement('div', { className: 'sidebar-logo' }, React.createElement('img', { src: KRS_LOGO, alt: 'KRS', style: { width: '32px', height: '32px', objectFit: 'contain' } })),
          React.createElement('div', { className: 'sidebar-nav' },
            React.createElement('button', {
              className: 'nav-item' + (view === 'teams' ? ' active' : ''),
              onClick: () => setView('teams'),
              title: 'Teams & Kan├дle',
              dangerouslySetInnerHTML: { __html: Icons.teams }
            }),
            React.createElement('button', {
              className: 'nav-item' + (view === 'chat' ? ' active' : ''),
              onClick: () => setView('chat'),
              title: 'Chats',
              dangerouslySetInnerHTML: { __html: Icons.chat }
            })
          ),
          React.createElement('div', { className: 'sidebar-bottom' },
            React.createElement('button', { className: 'icon-btn', onClick: handleLogout, title: 'Abmelden', dangerouslySetInnerHTML: { __html: Icons.logout } })
          )
        ),
        // Main content: Teams oder Chat
        React.createElement('div', { className: 'main' },
          view === 'teams' ? teamsView : chatView
        ),
        // Thread overlay (nur in Teams-View)
        view === 'teams' && openThread && React.createElement(ThreadPanel, { post: openThread, replies, dataService, user, onClose: () => setOpenThread(null) })
      );
    }

    // ============================================================
    // RENDER APP
    // ============================================================
    const root = ReactDOM.createRoot(document.getElementById('app'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
